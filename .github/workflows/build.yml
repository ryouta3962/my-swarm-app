name: Build and Push Docker Image

# mainブランチにPushされた時にこの処理を動かす
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHubのコードを取得する
      - name: Check out code
        uses: actions/checkout@v3

      # 2. Docker Hubにログインする
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. イメージをビルドしてDocker HubへPushする
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 🌟ここもあなたのDockerHubユーザー名に変更してください
          tags: ryoute/my-swarm-app:latest
